<svg xmlns="http://www.w3.org/2000/svg" width="420" height="840" viewBox="0 0 420 840" role="img" aria-label="自定义筛选页面示意图">
  <rect width="420" height="840" rx="36" fill="#164e63"/>
  <rect x="18" y="20" width="384" height="800" rx="28" fill="#f8fafc"/>
  <text x="42" y="74" font-family="Microsoft YaHei, Noto Sans SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">自定义筛选</text>
  <g font-family="Microsoft YaHei, Noto Sans SC, Arial, sans-serif">
    <rect x="42" y="104" width="336" height="78" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
