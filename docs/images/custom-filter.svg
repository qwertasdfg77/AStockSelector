    <text x="60" y="350" font-size="13" fill="#64748b">站上 MA250 · MA250 走平或向上</text>
    <rect x="328" y="315" width="30" height="18" rx="9" fill="#22c55e"/>
    <circle cx="349" cy="324" r="7" fill="#ffffff"/>
    <rect x="42" y="394" width="336" height="78" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="60" y="423" font-size="16" font-weight="700" fill="#111827">成交额类</text>
