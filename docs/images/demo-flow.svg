<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="260" viewBox="0 0 1180 260" role="img" aria-label="智能更新流程图">
  <rect width="1180" height="260" rx="24" fill="#f8fafc"/>
  <g font-family="Microsoft YaHei, Noto Sans SC, Arial, sans-serif">
    <text x="40" y="54" font-size="28" font-weight="700" fill="#111827">智能更新流程</text>
    <g transform="translate(38 92)">
      <rect x="0" y="0" width="160" height="78" rx="16" fill="#ecfeff" stroke="#67e8f9"/>
      <text x="80" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#155e75">点击刷新</text>
      <text x="80" y="58" text-anchor="middle" font-size="13" fill="#155e75">智能更新并筛选</text>
      <path d="M170 39 H228" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="240" y="0" width="170" height="78" rx="16" fill="#f0fdf4" stroke="#86efac"/>
      <text x="325" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">判断缓存</text>
      <text x="325" y="58" text-anchor="middle" font-size="13" fill="#166534">是否为收盘最新</text>
      <path d="M420 39 H478" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="490" y="0" width="170" height="78" rx="16" fill="#fff7ed" stroke="#fdba74"/>
      <text x="575" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">增量更新</text>
      <text x="575" y="58" text-anchor="middle" font-size="13" fill="#9a3412">新浪主源、腾讯备用</text>
      <path d="M670 39 H728" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="740" y="0" width="170" height="78" rx="16" fill="#eef2ff" stroke="#a5b4fc"/>
      <text x="825" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#3730a3">本地筛选</text>
      <text x="825" y="58" text-anchor="middle" font-size="13" fill="#3730a3">粗筛 + 并行计算</text>
      <path d="M920 39 H978" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="990" y="0" width="150" height="78" rx="16" fill="#fee2e2" stroke="#fca5a5"/>
      <text x="1065" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">今日信号</text>
      <text x="1065" y="58" text-anchor="middle" font-size="13" fill="#991b1b">新股置顶</text>
    </g>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
