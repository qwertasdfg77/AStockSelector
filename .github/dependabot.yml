version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    groups:
      android-framework:
        patterns:
          - "androidx.*"
      network-stack:
        patterns:
          - "com.squareup.*"
      android-build-tools:
        patterns:
          - "com.android.application"
          - "org.jetbrains.kotlin.*"
          - "org.jetbrains.kotlinx.*"
    commit-message:
      prefix: "deps(android)"
    labels:
      - "dependencies"
      - "android"
    ignore:
      # Keep dependency suggestions compatible with the current Android baseline:
      # compileSdk 35, Android Gradle Plugin 8.7.x, and Gradle 8.9.
      - dependency-name: "com.android.application"
        versions: [">=8.13.0"]
      - dependency-name: "org.jetbrains.kotlin.android"
        versions: [">=2.4.0"]
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        versions: [">=2.4.0"]
      - dependency-name: "androidx.compose:compose-bom"
        versions: [">=2026.06.00"]
      - dependency-name: "androidx.activity:*"
        versions: [">=1.12.0"]
      - dependency-name: "androidx.core:*"
        versions: [">=1.18.0"]
      - dependency-name: "androidx.lifecycle:*"
        versions: [">=2.10.0"]
      - dependency-name: "androidx.work:*"
        versions: [">=2.11.0"]
      - dependency-name: "com.squareup.okhttp3:*"
        versions: [">=5.0.0"]
      - dependency-name: "com.squareup.retrofit2:*"
        versions: [">=3.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    groups:
      workflow-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(actions)"
    labels:
      - "dependencies"
      - "github-actions"
