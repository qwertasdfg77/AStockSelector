version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    groups:
      android-framework:
        patterns:
          - "androidx.*"
      network-stack:
        patterns:
          - "com.squareup.*"
      android-build-tools:
        patterns:
          - "com.android.application"
          - "org.jetbrains.kotlin.*"
          - "org.jetbrains.kotlinx.*"
    commit-message:
      prefix: "deps(android)"
    labels:
      - "dependencies"
      - "android"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    groups:
      workflow-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(actions)"
    labels:
      - "dependencies"
      - "github-actions"
