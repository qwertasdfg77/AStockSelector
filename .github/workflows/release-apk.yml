name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Check signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "SIGNING_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "SIGNING_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Decode release keystore
        if: env.SIGNING_ENABLED == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/astockselector-release.jks"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/astockselector-release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        if: env.SIGNING_ENABLED == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon :app:assembleRelease

      - name: Collect APK files
        shell: bash
        run: |
          mkdir -p release-files
          cp app/build/outputs/apk/debug/app-debug.apk "release-files/AStockSelector-${GITHUB_REF_NAME}-debug.apk"
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk "release-files/AStockSelector-${GITHUB_REF_NAME}-release.apk"
          fi
          cd release-files
          sha256sum *.apk > SHA256SUMS.txt

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
