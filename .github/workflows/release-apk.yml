name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check release metadata consistency
        run: python scripts/check-release-consistency.py

      - name: Check signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "SIGNING_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "SIGNING_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Require release signing for updater releases
        if: startsWith(github.ref, 'refs/tags/') && env.SIGNING_ENABLED != 'true'
        run: |
          echo "Release tags must publish a signed release APK. Configure Android signing secrets before tagging."
          exit 1

      - name: Decode release keystore
        if: env.SIGNING_ENABLED == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/astockselector-release.jks"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/astockselector-release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        if: env.SIGNING_ENABLED == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Verify signed release APK
        if: env.SIGNING_ENABLED == 'true'
        shell: bash
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)"
          "$APKSIGNER" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk > release-signing-report.txt

      - name: Collect APK files
        shell: bash
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          mkdir -p release-files
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          RELEASE_FILE="AStockSelector-${GITHUB_REF_NAME}-release.apk"
          if [ -f "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "release-files/$RELEASE_FILE"
          else
            echo "Signed release APK is missing: $RELEASE_APK"
            exit 1
          fi
          if [ -f release-signing-report.txt ]; then
            cp release-signing-report.txt release-files/release-signing-report.txt
          else
            echo "Signing enabled: ${SIGNING_ENABLED}" > release-files/release-signing-report.txt
          fi
          {
            echo "Project: AStockSelector"
            echo "Version tag: ${GITHUB_REF_NAME}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Build time UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Signing enabled: ${SIGNING_ENABLED}"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > release-files/BUILD_INFO.txt
          if [ -f "docs/release-v${VERSION_NAME}.md" ]; then
            cp "docs/release-v${VERSION_NAME}.md" release-files/RELEASE_NOTES.md
          else
            {
              echo "# AStockSelector ${VERSION_NAME}"
              echo
              echo "本次发布对应 ${GITHUB_REF_NAME}。"
            } > release-files/RELEASE_NOTES.md
          fi
          cd release-files
          sha256sum "$RELEASE_FILE" > SHA256SUMS.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: astockselector-apk-${{ github.ref_name }}
          retention-days: 7
          path: |
            release-files/AStockSelector-${{ github.ref_name }}-release.apk
            release-files/BUILD_INFO.txt
            release-files/SHA256SUMS.txt
            release-files/release-signing-report.txt

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-files/RELEASE_NOTES.md
          files: |
            release-files/AStockSelector-${{ github.ref_name }}-release.apk
            release-files/BUILD_INFO.txt
            release-files/SHA256SUMS.txt
            release-files/release-signing-report.txt

      - name: Publish app update metadata
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ASTOCK_UPDATES_TOKEN: ${{ secrets.ASTOCK_UPDATES_TOKEN }}
        shell: bash
        run: |
          if [ -z "$ASTOCK_UPDATES_TOKEN" ]; then
            echo "Missing ASTOCK_UPDATES_TOKEN secret; cannot update astock-selector-updates."
            exit 1
          fi

          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE="$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("app/build.gradle.kts").read_text(encoding="utf-8")
          match = re.search(r"versionCode\s*=\s*(\d+)", text)
          if not match:
              raise SystemExit("versionCode not found")
          print(match.group(1))
          PY
          )"

          UPDATE_APK="release-files/AStockSelector-${GITHUB_REF_NAME}-release.apk"
          UPDATE_FILE="app-release.apk"

          UPDATE_SHA="$(sha256sum "$UPDATE_APK" | awk '{print $1}')"
          UPDATE_SIZE="$(wc -c < "$UPDATE_APK" | tr -d ' ')"
          RELEASE_NOTES="AStockSelector ${VERSION_NAME}：请查看 GitHub Release 页面获取完整中文说明。"

          git clone "https://x-access-token:${ASTOCK_UPDATES_TOKEN}@github.com/qwertasdfg77/astock-selector-updates.git" update-server
          cp "$UPDATE_APK" "update-server/$UPDATE_FILE"
          python - <<PY
          import json
          from pathlib import Path

          data = {
              "versionCode": int("${VERSION_CODE}"),
              "versionName": "${VERSION_NAME}",
              "apkUrl": "https://raw.githubusercontent.com/qwertasdfg77/astock-selector-updates/main/${UPDATE_FILE}",
              "apkSha256": "${UPDATE_SHA}",
              "apkSize": int("${UPDATE_SIZE}"),
              "releaseNotes": "${RELEASE_NOTES}",
          }
          Path("update-server/latest.json").write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          python scripts/check-release-artifact.py \
            --apk "$UPDATE_APK" \
            --latest-json "update-server/latest.json" \
            --tag "$GITHUB_REF_NAME" \
            --require-signed \
            --signing-report "release-files/release-signing-report.txt"

          cd update-server
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$UPDATE_FILE" latest.json
          if git diff --cached --quiet; then
            echo "No update metadata changes to publish."
          else
            git commit -m "Publish ${VERSION_NAME} update metadata"
            git push origin main
          fi

      - name: Verify published app update
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE="$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("app/build.gradle.kts").read_text(encoding="utf-8")
          match = re.search(r"versionCode\s*=\s*(\d+)", text)
          if not match:
              raise SystemExit("versionCode not found")
          print(match.group(1))
          PY
          )"
          python scripts/check-update-server-health.py \
            --latest-url "https://raw.githubusercontent.com/qwertasdfg77/astock-selector-updates/main/latest.json" \
            --expected-version-name "$VERSION_NAME" \
            --expected-version-code "$VERSION_CODE" \
            --retries 6 \
            --retry-delay 10

      - name: Clean old workflow artifacts
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/cleanup-github-artifacts.py \
            --repo "$GITHUB_REPOSITORY" \
            --keep-artifact "astockselector-apk-${GITHUB_REF_NAME}" \
            --keep-latest "github-pages"
