name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check CI scripts and workflows
        run: |
          python -m py_compile scripts/*.py
          python -m pip install pyyaml
          python scripts/check-ci-config.py

      - name: Check release metadata consistency
        run: python scripts/check-release-consistency.py

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug
