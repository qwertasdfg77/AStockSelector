name: 功能建议
description: 提出新功能、策略规则或文档改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个功能想改善什么？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述你希望怎么做。
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 如果是策略规则，请说明需要哪些日 K 指标和可能误判的情况。
